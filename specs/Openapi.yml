          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum: [autorizacion_excursion, acuse_disciplina, personalizado]
        title:
          type: string
        body:
          type: string
        related_id:
          type: string
          format: uuid

    SignatureRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        document_type:
          type: string
        status:
          type: string
          enum: [pendiente, firmado, rechazado]
        signed_at:
          type: string
          format: date-time
        rejected_reason:
          type: string

    SignDocumentRequest:
      type: object
      required: [action, signature_image_base64]
      properties:
        action:
          type: string
          enum: [sign]
        signature_image_base64:
          type: string

    RejectSignatureRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
          enum: [reject]
        reason:
          type: string

    FileUploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        filename:
          type: string
        mime_type:
          type: string
