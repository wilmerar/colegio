        student_id:
          type: string
          format: uuid
        check_out_at:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        status:
          type: string
          enum: [presente, tarde, ausente]
        check_in_at:
          type: string
          format: date-time
        check_out_at:
          type: string
          format: date-time

    AttendanceSummaryResponse:
      type: object
      properties:
        student_id:
          type: string
          format: uuid
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        summary:
          type: object
          properties:
            presente:
              type: integer
            tarde:
              type: integer
            ausente:
              type: integer
        records:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'

    CreateAssignmentRequest:
      type: object
      required: [title, subject, due_at, instructions]
      properties:
        title:
          type: string
        subject:
          type: string
