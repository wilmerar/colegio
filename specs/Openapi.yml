            format: uuid

    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        subject:
          type: string
        title:
          type: string
        instructions:
          type: string
        due_at:
          type: string
          format: date-time
        attachments:
