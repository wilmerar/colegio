          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        enrollment_code:
          type: string
        course_id:
          type: string
          format: uuid

    LinkGuardianRequest:
      type: object
      required: [parent_id, relationship]
      properties:
        parent_id:
          type: string
          format: uuid
        relationship:
          type: string
          enum: [padre, madre, tutor]
        is_primary:
          type: boolean
          default: false

    Guardian:
      type: object
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        relationship:
          type: string

    CreateAttendanceRequest:
      type: object
      required: [student_id, status]
      properties:
